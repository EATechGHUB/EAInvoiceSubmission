services:
  - type: web
    name: ea-budget-intake
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ASANA_PAT
        sync: false          # secret: set in the Render dashboard, never commit it
      - key: ASANA_PROJECT_GID
        value: "1216070629813582"          # FY27 Invoices project
      - key: ASANA_SECTION_GID
        value: "1216070629813583"          # "Invoices to be Processed" section (FY27)
      - key: ASANA_FIELD_MAP
        value: '{"vendor_name":"1216073242686048"}'   # Vendor Name (text) custom field (FY27)
